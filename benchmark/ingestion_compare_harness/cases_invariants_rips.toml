[meta]
version = 1
description = "End-to-end invariant comparison cases for Rips-family Euler parity."

[invariant_eligibility]
rips_parity = ["euler_signed_measure", "slice_barcodes", "mp_landscape"]
rips_codensity_parity = ["euler_signed_measure", "restricted_hilbert", "rank_signed_measure", "slice_barcodes", "mp_landscape"]
rips_lowerstar_parity = ["euler_signed_measure", "restricted_hilbert", "rank_signed_measure", "slice_barcodes", "mp_landscape"]

[[cases]]
id = "inv_rips_n1000_d2_s11"
regime = "rips_parity"
dataset = "gaussian_shell"
n_points = 1000
ambient_dim = 2
seed = 11
max_dim = 1

